<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Hub | Solomon Kin Records</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .identity-container { max-width: 900px; margin: 120px auto; padding: 0 5%; }
        
        /* The Specialized 'Profile Shield' Card (Magnetic Effect) */
        .profile-shield {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid var(--glass);
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            perspective: 1000px; /* Essential for 3D lifting effect */
        }
        
        /* Specialized Coding: Magnetic Lift & Glow on Hover */
        .profile-shield:hover {
            transform: translateY(-10px) rotateX(3deg);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* Glass highlight effect on hover */
        .profile-shield::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, rgba(212, 175, 55, 0) 60%);
            opacity: 0; transition: opacity 0.6s var(--ease); pointer-events: none;
        }
        .profile-shield:hover::after { opacity: 1; }

        .form-group { text-align: left; margin-bottom: 25px; }
        .form-group label { display: block; font-size: 0.75rem; color: var(--text-gray); text-transform: uppercase; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; font-family: inherit; }
        
    </style>
</head>
<body class="dashboard-bg">

    <nav class="top-nav">
        <div class="logo">SOLOMON <span class="gold-text">KIN</span></div>
        <div class="nav-links">
            <a href="billing.html">Manage Payments</a>
            <a href="dashboard.html" class="btn-outline-sm">Secure Vault</a>
        </div>
    </nav>

    <div class="identity-container">
        <header style="text-align: center; margin-bottom: 60px;">
            <span class="gold-text" style="letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase;">Identity Verification</span>
            <h1>Manage <span class="gold-text-italic">My Profile.</span></h1>
            <p style="color: var(--text-gray); margin-top: 20px;">Review and update your titles, names, and contact protocols in the secure ledger.</p>
        </header>

        <div class="profile-shield">
            <div id="product-icon" class="gold-seal" style="border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); padding: 15px; font-weight: 900; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">SKR</div>
            
            <form action="#">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Member One (Envoy Title)</label>
                        <input type="text" placeholder="Nehemiah Brown, Elected Envoy">
                    </div>
                    <div class="form-group">
                        <label>Member Two (Envoy Title)</label>
                        <input type="text" placeholder="Jane Doe, Social Officer">
                    </div>
                </div>

                <div class="form-group">
                    <label>Encrypted Ledger Email</label>
                    <input type="email" placeholder="n.brown@vexilla.org">
                </div>

                <button type="submit" class="btn-gold full-width">Update Legacy Identity</button>
            </form>
            
            <div style="margin-top: 40px; border-top: 1px solid var(--glass); padding-top: 30px;">
                <p style="font-size: 0.8rem; color: #555;">To terminate your record and IP Shield protection, visit the <a href="dissolve.html" style="color: #666; text-decoration: underline;">Dissolution Request Protocol</a> page.</p>
            </div>
        </div>
    </div>

</body>
</html>
